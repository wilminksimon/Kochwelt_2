<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontaktformular</title>
    <link rel="stylesheet" href="contact.css">
    <script src="contact.js"></script>
</head>

<body>
    <div class="box-shadow">
        <header class="wrapper">
            <a class="logo-header" href="index.html"><img src="/img/logo.png" alt="Logo" /></a>

            <div class="navMargin">
                <nav>
                    <a id="header-aktiv" href="./index.html">Start</a>
                    <a href="/Kochwelt_2/Rezept_Dennis/dennis-rezept.html">Rezept des Tages</a>
                    <a href="./contact.html">Kontakt</a>
                    <a href="/Kochwelt_2/Impressum/impressum.html">Impressum</a>
                </nav>
            </div>
        </header>
    </div>

    <div class="align-main">
        <main>
            <h2>Kontaktiere uns</h2>
            <form onsubmit="sendMail(event)">
                <div class="fs-field">
                    <label class="fs-label" for="name">Dein Name:</label>
                    <input class="fs-input" id="name" name="name" required />
                </div>
                <div class="fs-field">
                    <label class="fs-label" for="email">Deine Email:</label>
                    <input class="fs-input" id="email" name="email" required />

                </div>
                <div class="fs-field">
                    <label class="fs-label" for="message">Deine Nachricht:</label>
                    <textarea class="fs-textarea" rows="8" id="message" name="message" required></textarea>
                </div>
                <div class="fs-button-group">
                    <button class="fs-button" type="submit">Submit</button>
                </div>
            </form>
        </main>
    </div>

     <div class="bg-footer">
      <footer class="wrapper">
        <div>
          <a href="./index.html"><img src="/img/logo-blk.PNG" alt="logo" /></a>
        </div>
        <div class="sozial-media-logos">
          <a href=""
            ><img class="sozial-media" src="/img/Facebook.PNG" alt=""
          /></a>
          <a href=""
            ><img class="sozial-media" src="/img/Insta.PNG" alt=""
          /></a>
          <a href=""
            ><img class="sozial-media" src="/img/Twitter.PNG" alt=""
          /></a>
        </div>
      </footer>
    </div>

</body>

</html>
